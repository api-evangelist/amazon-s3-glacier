modified: '2026-04-19'
apis:
- name: Amazon S3 Glacier API
  description: >-
    The Amazon S3 Glacier API provides programmatic access to manage long-term
    archive storage. It enables developers to create and manage vaults, upload
    and retrieve archives, configure vault notifications and access policies,
    initiate inventory retrieval jobs, and manage data lifecycle for cost-
    effective archival storage.
  image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
  humanURL: https://aws.amazon.com/s3/storage-classes/glacier/
